
services:
  logre:
    build:
      context: .
      dockerfile: Dockerfile
    image: logre-app:latest
    profiles: ["dev"]
    depends_on:
      - rdf4j
    ports:
      - "${LOGRE_PORT:-8501}:8501"
    environment:
      RDF4J_REPOSITORY: ${RDF4J_REPOSITORY:-logre}
      RDF4J_SERVER_URL: ${RDF4J_SERVER_URL:-http://rdf4j:8080/rdf4j-server}
      RDF4J_HEALTHCHECK_URL: ${RDF4J_HEALTHCHECK_URL:-http://rdf4j:8080/rdf4j-server/}
      RDF4J_BOOTSTRAP_REPOSITORY: ${RDF4J_BOOTSTRAP_REPOSITORY:-1}
      LOGRE_CONFIG_PATH: /data/logre-config.yaml
      LOGRE_DEFAULT_CONFIG_PATH: /app/docker/logre-config.yml
      LOGRE_SKIP_BRANCH_DETECTION: "1"
      LOGRE_FORCE_CONFIG: ${LOGRE_FORCE_CONFIG:-0}
    volumes:
      - logre_data:/data
    command:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /data
        export RDF4J_SERVER_URL="$${RDF4J_SERVER_URL:-http://rdf4j:8080/rdf4j-server}"
        export RDF4J_REPOSITORY="$${RDF4J_REPOSITORY:-logre}"
        export LOGRE_TEMPLATE_RDF4J_URL="$${RDF4J_SERVER_URL}/repositories/$${RDF4J_REPOSITORY}"
        if [ ! -f /data/logre-config.yaml ]; then
          echo "[logre] Bootstrapping configuration from template."
          envsubst '$${LOGRE_TEMPLATE_RDF4J_URL} $${RDF4J_REPOSITORY}' < docker/logre-config.yml > /data/logre-config.yaml
        elif [ "$${LOGRE_FORCE_CONFIG:-0}" = "1" ]; then
          echo "[logre] LOGRE_FORCE_CONFIG=1, regenerating configuration from template."
          envsubst '$${LOGRE_TEMPLATE_RDF4J_URL} $${RDF4J_REPOSITORY}' < docker/logre-config.yml > /data/logre-config.yaml
        fi
        /app/scripts/wait-for-http.sh "$${RDF4J_HEALTHCHECK_URL:-http://rdf4j:8080/rdf4j-server/}" -- /bin/true
        if [ "$${RDF4J_BOOTSTRAP_REPOSITORY:-1}" = "1" ]; then
          /app/scripts/bootstrap-rdf4j.sh "$${RDF4J_SERVER_URL}" "$${RDF4J_REPOSITORY}"
        fi
        python3 /app/scripts/autoconfigure_data_graph.py --config /data/logre-config.yaml || true
        exec streamlit run src/server.py

  rdf4j:
    image: docker.io/eclipse/rdf4j-workbench:latest
    profiles: ["dev"]
    ports:
      - "${RDF4J_SERVER_PORT:-8080}:8080"
      - "${RDF4J_WORKBENCH_PORT:-8081}:8081"
    volumes:
      - rdf4j_data:/var/rdf4j

volumes:
  logre_data:
  rdf4j_data:
